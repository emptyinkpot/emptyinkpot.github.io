services:
  directus:
    image: directus/directus:11
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DIRECTUS_PORT:-8055}:8055"
    environment:
      KEY: "${DIRECTUS_KEY}"
      SECRET: "${DIRECTUS_SECRET}"
      ADMIN_EMAIL: "${DIRECTUS_ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${DIRECTUS_ADMIN_PASSWORD}"
      PUBLIC_URL: "${DIRECTUS_PUBLIC_URL}"
      DB_CLIENT: "sqlite3"
      DB_FILENAME: "/directus/database/data.db"
      STORAGE_LOCATIONS: "local"
      STORAGE_LOCAL_DRIVER: "local"
      STORAGE_LOCAL_ROOT: "/directus/uploads"
      TELEMETRY: "false"
    volumes:
      - ./directus/database:/directus/database
      - ./directus/uploads:/directus/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8055/server/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  meilisearch:
    image: getmeili/meilisearch:v1.13
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MEILI_PORT:-7700}:7700"
    environment:
      MEILI_ENV: "${MEILI_ENV:-production}"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY}"
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ./meilisearch:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
