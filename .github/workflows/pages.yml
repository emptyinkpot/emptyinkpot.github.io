name: Deploy Blog and site-v2 Preview to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site-v2/package-lock.json

      - name: Install Hexo dependencies
        run: npm ci

      - name: Install site-v2 dependencies
        run: npm ci
        working-directory: site-v2

      - name: Clean Hexo output
        run: npm run clean

      - name: Build Hexo site
        run: npm run build

      - name: Build site-v2 preview
        run: npm run build
        working-directory: site-v2
        env:
          SITE_BASE: /site-v2/
          SITE_URL: https://emptyinkpot.github.io

      - name: Embed site-v2 preview under /site-v2/
        run: |
          rm -rf public/site-v2
          mkdir -p public/site-v2
          cp -R site-v2/dist/. public/site-v2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
