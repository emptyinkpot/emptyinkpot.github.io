name: Retire GitHub Pages Entry

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: retired-pages
  cancel-in-progress: true

jobs:
  retire:
    environment:
      name: github-pages
      url: https://blog.tengokukk.com/
    runs-on: ubuntu-latest
    steps:
      - name: Build retired entry
        run: |
          mkdir -p retired-pages
          cat > retired-pages/index.html <<'HTML'
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <meta name="robots" content="noindex,nofollow" />
              <meta http-equiv="refresh" content="0; url=https://blog.tengokukk.com/" />
              <link rel="canonical" href="https://blog.tengokukk.com/" />
              <title>MyBlog 已迁移</title>
              <style>
                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  background: #f3efe7;
                  color: #201b16;
                  font-family: ui-serif, "Noto Serif SC", Georgia, serif;
                }
                main {
                  max-width: 34rem;
                  padding: 2rem;
                }
                a {
                  color: #1f4a5f;
                }
              </style>
            </head>
            <body>
              <main>
                <h1>MyBlog 已迁移</h1>
                <p>当前唯一生产入口是 <a href="https://blog.tengokukk.com/">blog.tengokukk.com</a>。</p>
              </main>
            </body>
          </html>
          HTML
          cp retired-pages/index.html retired-pages/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload retired artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: retired-pages

      - name: Deploy retired entry
        id: deployment
        uses: actions/deploy-pages@v5
