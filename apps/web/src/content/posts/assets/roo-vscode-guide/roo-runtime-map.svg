<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Roo 运行态结构图</title>
  <desc id="desc">展示 .roo 作为唯一活动根目录，Roo 与 Claude 同时指向 .roo 下的 MCP server，.cursor 只保留为历史归档。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f2ea" />
      <stop offset="100%" stop-color="#efe4d4" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#6f5b45" flood-opacity="0.18" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7a5c3e" />
    </marker>
  </defs>

  <rect width="1200" height="720" rx="36" fill="url(#bg)" />
  <text x="70" y="78" font-size="34" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#2f2419" font-weight="700">
    Roo 在 VS Code 里的活动运行态
  </text>
  <text x="70" y="114" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#6a5746">
    关键原则：活动入口全部收口到 .roo，.cursor 只做归档与迁移参考
  </text>

  <g filter="url(#shadow)">
    <rect x="58" y="178" width="250" height="390" rx="28" fill="#d9d4cf" opacity="0.95" />
    <text x="88" y="226" font-size="26" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#51463c" font-weight="700">历史归档</text>
    <text x="88" y="264" font-size="22" font-family="Consolas, Segoe UI, monospace" fill="#675b50">C:\Users\ASUS-KL\.cursor</text>
    <text x="88" y="318" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f5348">保留内容</text>
    <text x="88" y="352" font-size="17" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f5348">- permissions / sandbox / argv</text>
    <text x="88" y="382" font-size="17" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f5348">- ide_state / extensions</text>
    <text x="88" y="412" font-size="17" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f5348">- Cursor 兼容文档</text>
    <line x1="90" y1="470" x2="275" y2="525" stroke="#9d5b53" stroke-width="14" stroke-linecap="round" />
    <line x1="275" y1="470" x2="90" y2="525" stroke="#9d5b53" stroke-width="14" stroke-linecap="round" />
    <text x="88" y="554" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f5348">
      不再作为活动运行依赖
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="132" width="470" height="470" rx="34" fill="#fffdf8" />
    <text x="392" y="184" font-size="30" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#2d241a" font-weight="700">
      活动根目录
    </text>
    <text x="392" y="222" font-size="24" font-family="Consolas, Segoe UI, monospace" fill="#7a5c3e">
      C:\Users\ASUS-KL\.roo
    </text>

    <rect x="394" y="258" width="180" height="96" rx="20" fill="#f3e5d2" />
    <text x="418" y="302" font-size="24" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f4022" font-weight="700">mcps</text>
    <text x="418" y="334" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f4022">每个目录都有 server.mjs</text>

    <rect x="610" y="258" width="180" height="96" rx="20" fill="#e8efe2" />
    <text x="636" y="302" font-size="24" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#35502f" font-weight="700">skills</text>
    <text x="636" y="334" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#35502f">.roo-managed-skills-manifest.json</text>

    <rect x="394" y="382" width="180" height="96" rx="20" fill="#e3ebf6" />
    <text x="418" y="426" font-size="24" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#29496d" font-weight="700">orchestration</text>
    <text x="418" y="458" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#29496d">流水线与日志落在这里</text>

    <rect x="610" y="382" width="180" height="96" rx="20" fill="#f4e3ea" />
    <text x="636" y="426" font-size="24" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#6a3551" font-weight="700">agents</text>
    <text x="636" y="458" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#6a3551">角色提示词与分工</text>

    <rect x="394" y="506" width="396" height="64" rx="18" fill="#f6f1e8" />
    <text x="418" y="547" font-size="20" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#4d3b2a">
      RUNTIME-STATUS.md 负责记录当前活动真源
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="874" y="166" width="266" height="178" rx="26" fill="#fffaf1" />
    <text x="902" y="212" font-size="26" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#4c3720" font-weight="700">VS Code Roo</text>
    <text x="902" y="250" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5e4730">mcp_settings.json</text>
    <text x="902" y="284" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5e4730">
      直接指向 .roo\mcps\*\server.mjs
    </text>
    <text x="902" y="316" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5e4730">
      Reload Window 后重新扫描
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="874" y="392" width="266" height="178" rx="26" fill="#fffaf1" />
    <text x="902" y="438" font-size="26" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#4c3720" font-weight="700">Claude Code</text>
    <text x="902" y="476" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5e4730">.claude.json / .claude\settings.json</text>
    <text x="902" y="510" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5e4730">
      MCP 入口与权限与 Roo 对齐
    </text>
    <text x="902" y="542" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5e4730">
      默认可直接调 Roo MCP
    </text>
  </g>

  <path d="M830 304 C 850 304, 850 255, 874 255" fill="none" stroke="#7a5c3e" stroke-width="6" marker-end="url(#arrow)" />
  <path d="M830 430 C 850 430, 850 480, 874 480" fill="none" stroke="#7a5c3e" stroke-width="6" marker-end="url(#arrow)" />

  <text x="390" y="650" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#584635">
    结论：只要活动配置继续指向 .roo，后续扩展 MCP、Skill、Agent 都能沿着同一条链路长出来。
  </text>
</svg>
