<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Roo 调用链示意图</title>
  <desc id="desc">展示用户在 Roo 中发起请求后，如何经过 Skill 或 MCP 工具进入 server.mjs，再生成回归证据并返回摘要。</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5efe6" />
      <stop offset="100%" stop-color="#ebe0d0" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#6d5947" flood-opacity="0.18" />
    </filter>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7b5d3f" />
    </marker>
  </defs>

  <rect width="1200" height="720" rx="36" fill="url(#bg2)" />
  <text x="72" y="80" font-size="34" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#2f2419" font-weight="700">
    Roo 里一次自然语言请求是怎么落到 MCP / Skill 的
  </text>
  <text x="72" y="116" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#6a5746">
    核心经验：先说目的，再说对象，再说你要的输出形式
  </text>

  <g filter="url(#shadow2)">
    <rect x="70" y="190" width="250" height="150" rx="26" fill="#fffaf1" />
    <text x="100" y="236" font-size="26" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#50381e" font-weight="700">1. 用户提示词</text>
    <text x="100" y="276" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f4730">
      例：请调用 repo-inspector
    </text>
    <text x="100" y="304" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f4730">
      检查 E:\MyBlog，并给我 JSON 摘要
    </text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="390" y="152" width="300" height="110" rx="24" fill="#e9efe4" />
    <text x="420" y="198" font-size="26" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#35502f" font-weight="700">2A. Skill 流程层</text>
    <text x="420" y="232" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#35502f">
      适合 release-preflight / incident-triage
    </text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="390" y="304" width="300" height="110" rx="24" fill="#e7edf7" />
    <text x="420" y="350" font-size="26" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#29496d" font-weight="700">2B. MCP 工具层</text>
    <text x="420" y="384" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#29496d">
      适合 repo-inspector / playwright-browser
    </text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="770" y="224" width="250" height="138" rx="24" fill="#f7e8d7" />
    <text x="800" y="270" font-size="26" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f4022" font-weight="700">3. server.mjs</text>
    <text x="800" y="304" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f4022">
      负责 initialize / tools/list / tools/call
    </text>
    <text x="800" y="332" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f4022">
      是 Roo / Claude 真正连接的入口
    </text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="1042" y="198" width="112" height="190" rx="22" fill="#f1ece6" />
    <text x="1060" y="246" font-size="22" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#52473d" font-weight="700">4.</text>
    <text x="1060" y="280" font-size="20" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#52473d">探针</text>
    <text x="1060" y="308" font-size="20" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#52473d">或流水线</text>
    <text x="1060" y="348" font-size="15" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#52473d">start.cmd</text>
    <text x="1060" y="374" font-size="15" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#52473d">or</text>
    <text x="1060" y="400" font-size="15" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#52473d">真实服务逻辑</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="364" y="500" width="780" height="140" rx="28" fill="#fffdf8" />
    <text x="392" y="548" font-size="28" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#4d3824" font-weight="700">
      5. 证据与结果
    </text>
    <text x="392" y="584" font-size="17" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f4730">
      最新证据会落到 .roo\mcps\_artifacts\acceptance
    </text>
    <text x="392" y="612" font-size="17" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f4730">
      例如 skill-discovery-summary、all-mcps-regression-summary、repo-inspector-*.json
    </text>
    <text x="392" y="640" font-size="17" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#5f4730">
      Roo 再把工具输出整理成人类可读摘要，反馈给你
    </text>
  </g>

  <path d="M320 264 C 345 264, 350 206, 390 206" fill="none" stroke="#7b5d3f" stroke-width="6" marker-end="url(#arrow2)" />
  <path d="M320 292 C 345 292, 350 360, 390 360" fill="none" stroke="#7b5d3f" stroke-width="6" marker-end="url(#arrow2)" />
  <path d="M690 206 C 728 206, 734 248, 770 270" fill="none" stroke="#7b5d3f" stroke-width="6" marker-end="url(#arrow2)" />
  <path d="M690 360 C 728 360, 734 334, 770 314" fill="none" stroke="#7b5d3f" stroke-width="6" marker-end="url(#arrow2)" />
  <path d="M1020 292 C 1028 292, 1030 292, 1042 292" fill="none" stroke="#7b5d3f" stroke-width="6" marker-end="url(#arrow2)" />
  <path d="M1098 388 C 1098 430, 920 456, 920 500" fill="none" stroke="#7b5d3f" stroke-width="6" marker-end="url(#arrow2)" />

  <text x="72" y="688" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#584635">
    实际使用时，不必记内部实现细节。把需求说清楚，Roo 会决定是走 Skill 还是走具体 MCP。
  </text>
</svg>
