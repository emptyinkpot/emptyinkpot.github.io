<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" rx="32" fill="#F6F4EE"/>
  <rect x="56" y="52" width="1168" height="616" rx="28" fill="#FFFDF8" stroke="#D9D2C3" stroke-width="4"/>
  <rect x="96" y="96" width="320" height="528" rx="24" fill="#13343B"/>
  <text x="128" y="154" fill="#F7F2E8" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Root ESLint</text>
  <text x="128" y="198" fill="#A8D5CC" font-family="Segoe UI, Arial, sans-serif" font-size="20">统一入口与规则</text>
  <rect x="128" y="236" width="256" height="84" rx="18" fill="#1E525C"/>
  <text x="152" y="276" fill="#F7F2E8" font-family="Consolas, monospace" font-size="22">eslint.config.mjs</text>
  <text x="152" y="304" fill="#A8D5CC" font-family="Segoe UI, Arial, sans-serif" font-size="18">统一管控 apps/web 与 tools</text>
  <rect x="128" y="346" width="256" height="84" rx="18" fill="#1E525C"/>
  <text x="152" y="386" fill="#F7F2E8" font-family="Consolas, monospace" font-size="22">package.json</text>
  <text x="152" y="414" fill="#A8D5CC" font-family="Segoe UI, Arial, sans-serif" font-size="18">统一执行 npm run lint</text>
  <rect x="128" y="456" width="256" height="124" rx="18" fill="#1E525C"/>
  <text x="152" y="496" fill="#F7F2E8" font-family="Consolas, monospace" font-size="22">npm run lint</text>
  <text x="152" y="526" fill="#A8D5CC" font-family="Segoe UI, Arial, sans-serif" font-size="18">检查 Astro / TypeScript /</text>
  <text x="152" y="554" fill="#A8D5CC" font-family="Segoe UI, Arial, sans-serif" font-size="18">Tools 脚本是否符合规则</text>
  <rect x="504" y="118" width="620" height="184" rx="24" fill="#FFF8E7" stroke="#E7C97A" stroke-width="4"/>
  <text x="544" y="168" fill="#7D5B11" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">1. 仓库根目录统一持有规则</text>
  <text x="544" y="214" fill="#6A5730" font-family="Segoe UI, Arial, sans-serif" font-size="22">避免 apps/web、tools、测试脚本各自维护一份 lint 配置。</text>
  <text x="544" y="250" fill="#6A5730" font-family="Segoe UI, Arial, sans-serif" font-size="22">规则放根目录，调用入口也放根目录，最容易做团队协作与 CI 收口。</text>
  <rect x="504" y="332" width="620" height="132" rx="24" fill="#EAF6EF" stroke="#82C89B" stroke-width="4"/>
  <text x="544" y="382" fill="#165C2D" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">2. 子应用只保留业务依赖</text>
  <text x="544" y="426" fill="#2E5E3B" font-family="Segoe UI, Arial, sans-serif" font-size="22">Astro 站点继续在 apps/web，ESLint 规则则由根目录统一调度。</text>
  <rect x="504" y="494" width="620" height="102" rx="24" fill="#EEF3FF" stroke="#90A7E8" stroke-width="4"/>
  <text x="544" y="544" fill="#224493" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">3. 先 lint，再 check，再 build</text>
  <text x="544" y="578" fill="#3D558B" font-family="Segoe UI, Arial, sans-serif" font-size="22">形成发布前最小质量门：代码风格、内容治理、站点构建。</text>
  <path d="M424 278H476" stroke="#C28532" stroke-width="8" stroke-linecap="round"/>
  <path d="M460 260L486 278L460 296" stroke="#C28532" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M424 388H476" stroke="#2F8F56" stroke-width="8" stroke-linecap="round"/>
  <path d="M460 370L486 388L460 406" stroke="#2F8F56" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M424 520H476" stroke="#4B72D8" stroke-width="8" stroke-linecap="round"/>
  <path d="M460 502L486 520L460 538" stroke="#4B72D8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
